<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登入頁面</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div id="app" class="container mt-4">
    <h3>登入</h3>
    <div class="mb-3">
        <label>電話號碼</label>
        <input type="text" v-model="loginForm.phoneNumber" class="form-control">
    </div>
    <div class="mb-3">
        <label>密碼</label>
        <input type="password" v-model="loginForm.password" class="form-control">
    </div>
    <p class="text-danger">{{ loginError }}</p>
    <button class="btn btn-primary" @click="login">登入</button>
    <button class="btn btn-light" @click="showRegisterModal = true">會員註冊</button>

    <!-- 註冊 Modal -->
    <div v-if="showRegisterModal" class="modal-backdrop fade show"></div>
    <div v-if="showRegisterModal" class="modal d-block" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">會員註冊</h5>
                    <button type="button" class="btn-close" @click="showRegisterModal = false"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-3">
                        <label>電話號碼</label>
                        <input type="text" v-model="registerForm.phoneNumber" class="form-control">
                    </div>
                    <div class="mb-3">
                        <label>密碼</label>
                        <input type="password" v-model="registerForm.password" class="form-control">
                    </div>
                    <div class="mb-3">
                        <label>電子郵件</label>
                        <input type="text" v-model="registerForm.email" class="form-control">
                    </div>
                    <div class="mb-3">
                        <label>用戶名稱</label>
                        <input type="text" v-model="registerForm.username" class="form-control">
                    </div>
                </div>
                <div class="modal-footer">
                    <button class="btn btn-secondary" @click="showRegisterModal = false">取消</button>
                    <button class="btn btn-primary" @click="register">註冊</button>
                </div>
            </div>
        </div>
    </div>
    <p class="text-success">{{ registerSuccess }}</p>
    <p class="text-danger">{{ registerError }}</p>
</div>

<script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
<script src="/js/login.js"></script>
</body>
</html>
